esphome:
  on_boot:
    then:
      - speaker.mute_on:
      - speaker.mute_off:
      - if:
          condition: speaker.is_stopped
          then:
            - speaker.play: [0, 1, 2, 3]
      - speaker.volume_set: 0.9
      - if:
          condition: speaker.is_playing
          then:
            - speaker.finish:
      - speaker.stop:

audio_dac:
  - platform: aic3204
    i2c_id: i2c_bus
    id: internal_dac

speaker:
  - platform: i2s_audio
    id: speaker_with_audio_dac_id
    i2s_audio_id: i2s_audio_bus
    audio_dac: internal_dac
    dac_type: external
    i2s_dout_pin: ${i2s_dout_pin}
